<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Trekking & Travel Packing Assistant — generate your perfect packing checklist." />
    <title>Trek Pack Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-inner">
        <span class="header-icon">🏔️</span>
        <div>
          <h1>Trek Pack Assistant</h1>
          <p class="header-sub">Smart packing for every trail.</p>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main-container">

      <!-- FORM SECTION -->
      <section class="form-section">
        <div class="form-card">

          <div class="form-group">
            <label for="destination">Destination Type</label>
            <select id="destination">
              <option value="" disabled selected>Select your destination</option>
              <option value="snow">❄️ Snow / Trek</option>
              <option value="hill">⛰️ Hill / Hike</option>
              <option value="terai">🌿 Terai / Safari</option>
            </select>
          </div>

          <div class="form-group">
            <label for="days">Number of Days</label>
            <input
              type="number"
              id="days"
              placeholder="e.g. 3"
              min="1"
              max="30"
            />
          </div>

          <button id="generate-btn">Generate Packing List</button>

        </div>
      </section>

      <section class="progress-section" id="progress-section" hidden>
        <div class="progress-header">
          <span>Packing Progress</span>
          <span id="progress-label">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <p class="progress-sub" id="progress-sub">0 of 0 items packed</p>
     <p class="completed-msg" id="completed-msg">
  🎒 All packed! Have a great trek!
</p>
 </section>

      <!-- CHECKLIST SECTION -->
      <section class="checklist-section" id="checklist-section" hidden>
        <div class="checklist-header">
          <h2 id="checklist-title">Your Packing List</h2>
          <button id="reset-btn">Reset</button>
        </div>
        <ul id="checklist" class="checklist"></ul>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="app-footer">
      <p>Built for the trails. Pack smart, trek safe. 🌿</p>
    </footer>

    <script src="script.js"></script>

  </body>
</html>
